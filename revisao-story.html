<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Revisão — Story</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;padding:24px;max-width:1100px;margin:0 auto}
h1{text-align:center;margin-bottom:6px;font-size:22px}
.sub{text-align:center;color:#666;margin-bottom:28px;font-size:13px}

/* Story section */
.sec{background:#151515;border-radius:12px;padding:20px;margin-bottom:20px}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.sb{padding:2px 10px;border-radius:4px;font-size:10px;font-weight:700}

/* Two-column layout: preview | controls */
.slide-row{display:flex;gap:20px;align-items:flex-start}
.slide-left{flex-shrink:0}
.slide-right{flex:1;min-width:0}

/* Preview 9:16 — 202×360px */
.preview{width:202px;height:360px;border-radius:10px;overflow:hidden;position:relative;background:#000;flex-shrink:0}
.preview-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.preview-ov{position:absolute;inset:0}
.preview-content{position:absolute;inset:0;display:flex;flex-direction:column;padding:14px;z-index:2}
.preview-logo{height:28px;width:auto;object-fit:contain;margin-bottom:4px;opacity:.95}
.preview-pretitle{font-size:5px;letter-spacing:1px;margin-bottom:2px;font-weight:400}
.preview-headline{line-height:1.05;letter-spacing:-.2px;margin-bottom:4px;white-space:pre-line}
.preview-body{line-height:1.3;opacity:.85;white-space:pre-line}
.preview-cta-btn{display:inline-block;padding:4px 14px;border-radius:20px;font-size:7px;letter-spacing:.5px;margin-top:6px;align-self:center}

/* CTA swipe-up bar (story only) */
.preview-cta-area{position:absolute;bottom:0;left:0;right:0;height:38px;background:rgba(255,255,255,.13);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;gap:4px;z-index:3}
.preview-cta-area svg{width:10px;height:10px;opacity:.8}
.preview-cta-area span{font-size:6.5px;letter-spacing:.5px;opacity:.9}

/* Safety zone guides */
.preview-safe-top{position:absolute;top:15%;left:0;right:0;height:1px;background:rgba(255,255,0,.18);z-index:4;pointer-events:none}
.preview-safe-bot{position:absolute;bottom:15%;left:0;right:0;height:1px;background:rgba(255,255,0,.18);z-index:4;pointer-events:none}

/* Form fields */
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;margin-top:10px}
.fld label:first-child{margin-top:0}
.fld input,.fld textarea{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;color:#fff;padding:10px 12px;border-radius:6px;font-size:14px;outline:none;font-family:inherit}
.fld textarea{resize:vertical;min-height:60px;line-height:1.4}
.fld input:focus,.fld textarea:focus{border-color:#555}

/* Overlay controls row */
.ov-row{display:flex;gap:16px;align-items:flex-start;margin-top:10px;flex-wrap:wrap}
.ov-sel{display:flex;gap:6px;flex-wrap:wrap}
.ov-opt{background:#252525;border:1px solid #2a2a2a;color:#888;padding:4px 10px;border-radius:5px;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
.ov-opt:hover{color:#fff;border-color:#444}
.ov-opt.on{border-color:currentColor}

/* Overlay intensity slider */
.ov-intensity{display:flex;align-items:center;gap:8px;margin-left:auto}
.ov-intensity label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.ov-intensity input[type=range]{width:100px;accent-color:#c0392b;cursor:pointer}
.ov-intensity .ov-val{font-size:11px;color:#888;min-width:32px;text-align:right;font-variant-numeric:tabular-nums}

/* CTA toggle */
.cta-toggle{display:flex;align-items:center;gap:8px;margin-top:10px}
.cta-toggle label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px}
.cta-toggle input[type=checkbox]{width:16px;height:16px;accent-color:#c0392b;cursor:pointer}

/* Image info */
.img-info{display:flex;align-items:center;gap:10px;margin-top:14px;padding:10px;background:#0a0a0a;border-radius:8px;border:1px solid #2a2a2a}
.img-info img{width:60px;height:60px;object-fit:cover;border-radius:6px;background:#252525}
.img-info-text{flex:1;min-width:0}
.img-info-name{font-size:12px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-info-folder{font-size:10px;color:#555;margin-top:2px}
.img-btns{display:flex;gap:8px;margin-top:10px}
.img-btn{background:#252525;border:1px solid #333;color:#aaa;padding:6px 14px;border-radius:6px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px}
.img-btn:hover{border-color:#4285f4;color:#4285f4}
.img-btn-remove{border-color:#c0392b22}
.img-btn-remove:hover{border-color:#c0392b;color:#c0392b}
.no-img{color:#555;font-style:italic;font-size:13px;padding:10px;background:#0a0a0a;border-radius:8px;border:1px dashed #333;margin-top:14px}

/* Safety zone note */
.safe-note{font-size:10px;color:#444;margin-top:8px;font-style:italic}
.safe-note span{color:#666}

/* S3 list markers — accent color */
.preview ul li::marker{color:var(--story-accent,#FA5701)}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200}
.modal{display:none;position:fixed;top:3vh;left:50%;transform:translateX(-50%);width:900px;max-width:95vw;height:90vh;background:#151515;border-radius:16px;border:1px solid #333;z-index:201;flex-direction:column;overflow:hidden}
.modal-head{padding:14px 20px;border-bottom:1px solid #252525;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-head-info{display:flex;flex-direction:column;gap:2px}
.modal-head-info small{font-size:10px;color:#555;font-weight:400}
.modal-close{background:none;border:none;color:#666;font-size:28px;cursor:pointer;line-height:1}.modal-close:hover{color:#fff}
.modal-tabs{padding:10px 20px;border-bottom:1px solid #252525;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.tab{background:#252525;border:1px solid #2a2a2a;color:#888;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap}
.tab:hover{color:#fff;border-color:#444}.tab.on{background:#c0392b;border-color:#c0392b;color:#fff}
.modal-search{background:#0a0a0a;border:1px solid #2a2a2a;color:#fff;padding:5px 12px;border-radius:6px;font-size:11px;min-width:160px;outline:none;margin-left:auto}
.grid-scroll{flex:1;overflow-y:auto;min-height:0;padding:14px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,150px);gap:10px;justify-content:center}
.mc{background:#1e1e1e;border-radius:6px;overflow:hidden;cursor:pointer;outline:2px solid transparent;transition:all .12s}
.mc:hover{outline-color:#c0392b}
.mc img{width:150px;height:150px;object-fit:cover;display:block;background:#252525}
.mc p{padding:4px 6px;font-size:9px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc small{display:block;padding:0 6px 4px;font-size:8px;color:#333}

/* Bottom bar */
.bot{position:fixed;bottom:0;left:0;right:0;background:#151515;border-top:1px solid #252525;padding:12px 24px;display:flex;justify-content:center;align-items:center;gap:16px;z-index:100}
#cbtn{background:#2ecc71;color:#000;border:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
#cbtn:hover{background:#27ae60}
#stat{color:#888;font-size:12px;min-width:220px;text-align:right}
.spc{height:60px}

/* Copy modal */
.cbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300}
.cm{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:20px;z-index:301;width:580px;max-width:92vw}
.cm h3{color:#2ecc71;margin-bottom:6px}
.cm textarea{width:100%;height:200px;background:#0a0a0a;color:#2ecc71;border:1px solid #333;border-radius:6px;padding:10px;font-family:monospace;font-size:11px;resize:none}
.cm button{margin-top:10px;background:#c0392b;color:#fff;border:none;padding:7px 18px;border-radius:6px;cursor:pointer}
</style>
</head>
<body>
<h1 id="page-title">Revisão — Story</h1>
<p class="sub" id="page-sub"></p>
<div id="app"></div>
<div class="spc"></div>
<div class="overlay" id="ov"></div>
<div class="modal" id="modal">
  <div class="modal-head">
    <div class="modal-head-info"><h3 id="mtitle">Buscar no Drive</h3><small id="mfolder"></small></div>
    <button class="modal-close" id="mcls">&times;</button>
  </div>
  <div class="modal-tabs" id="mtabs"></div>
  <div class="grid-scroll"><div class="grid" id="mgrid"></div></div>
</div>
<div class="cbg" id="cbg"></div>
<div class="cm" id="cmod"><h3>Copiado!</h3><textarea id="ctx" readonly></textarea><button id="ccl">Fechar</button></div>
<div class="bot"><span id="stat"></span><button id="cbtn">Copiar tudo</button></div>

<!-- Data files -->
<script src="gallery.js"></script>
<script src="slides.js"></script>
<script src="design.js"></script>
<script>
// DS = { palette, typography, overlays, logoB64, projectName, driveFolderName, imagesFolderId }
// META = { project, theme, formato: "story" }
// S = [{ num, type, headline, body, overlay, overlayIntensity, showLogo, pretitle, showCta, cta, candidates, selectedImage }]
// G = [{ id, name, folder, thumb }]
// FC = { "Folder": count }

var sel = {}, asl = null;

// Initialize defaults
S.forEach(function(s) {
  if (s.selectedImage && s.selectedImage.id) sel[s.num] = s.selectedImage.id;
  if (s.overlayIntensity === undefined) s.overlayIntensity = 72;
  if (s.showCta === undefined) s.showCta = (s.type === "CTA" || s.type === "PROMO");
  if (!s.storyTemplate) {
    var tmplMap = { bottom:"S1", left:"S2", top:"S3", right:"S4", gradientBrand:"S6" };
    s.storyTemplate = tmplMap[s.overlay] || "S1";
  }
});

// Inject custom fonts
function fontFormat(b64) {
  if (b64.indexOf("/otf") > -1 || b64.indexOf("opentype") > -1) return "opentype";
  if (b64.indexOf("/woff2") > -1) return "woff2";
  if (b64.indexOf("/woff;") > -1) return "woff";
  return "truetype";
}
(function injectFonts() {
  if (!DS || !DS.typography) return;
  var st = document.createElement("style");
  var css = "";
  if (DS.typography.headingB64) {
    css += "@font-face{font-family:'" + DS.typography.headingFont + "';src:url('" + DS.typography.headingB64 + "') format('" + fontFormat(DS.typography.headingB64) + "')}\n";
  }
  if (DS.typography.bodyB64) {
    css += "@font-face{font-family:'" + DS.typography.bodyFont + "';src:url('" + DS.typography.bodyB64 + "') format('" + fontFormat(DS.typography.bodyB64) + "')}\n";
  }
  st.textContent = css;
  document.head.appendChild(st);
})();

// Page header
document.getElementById("page-title").textContent = "Revisão — Story — " + (DS.projectName || META.project || "");
document.getElementById("page-sub").textContent =
  (META.theme ? META.theme + " — " : "") + S.length + " stories — " + G.length + " fotos no acervo"
  + (DS.driveFolderName ? " — 📁 " + DS.driveFolderName : "");

function esc(s) { return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;") }

// Build overlay gradient with custom intensity
function buildOverlayGrad(direction, intensity) {
  var a1 = (intensity / 100).toFixed(2);
  var a2 = (intensity * 0.76 / 100).toFixed(2);
  if (direction === "bottom") return "linear-gradient(to top, rgba(0,0,0," + a1 + ") 0%, rgba(0,0,0," + a2 + ") 40%, rgba(0,0,0,0) 100%)";
  if (direction === "top")    return "linear-gradient(to bottom, rgba(0,0,0," + a1 + ") 0%, rgba(0,0,0," + a2 + ") 40%, rgba(0,0,0,0) 100%)";
  if (direction === "left")   return "linear-gradient(to right, rgba(0,0,0," + a1 + ") 0%, rgba(0,0,0," + a2 + ") 40%, rgba(0,0,0,0) 100%)";
  if (direction === "right")  return "linear-gradient(to left, rgba(0,0,0," + a1 + ") 0%, rgba(0,0,0," + a2 + ") 40%, rgba(0,0,0,0) 100%)";
  return "";
}

function getImageThumb(slideNum) {
  var imgId = sel[slideNum];
  if (!imgId) return null;
  var slide = S.find(function(s) { return s.num === slideNum });
  if (slide && slide.selectedImage && slide.selectedImage.id === imgId && slide.selectedImage.thumb) {
    return slide.selectedImage;
  }
  var gi = G.find(function(g) { return g.id === imgId });
  if (gi) return { id: gi.id, thumb: gi.thumb, name: gi.name, folder: gi.folder };
  if (slide && slide.candidates) {
    var ci = slide.candidates.find(function(c) { return c.id === imgId });
    if (ci) return { id: ci.id, thumb: ci.thumb, name: ci.name, folder: "" };
  }
  return null;
}

function renderPreview(s, headline, body, pretitle, cta) {
  var pal  = DS.palette    || {};
  var typo = DS.typography || {};
  var primary      = pal.primary      || "#FA5701";
  var primaryDark  = pal.primaryDark  || "#612100";
  var primaryLight = pal.primaryLight || "#fe9862";
  var textLight    = pal.textLight    || "#fff";
  var hFont = "'" + (typo.headingFont || "sans-serif") + "',sans-serif";
  var bFont = "'" + (typo.bodyFont    || "sans-serif") + "',sans-serif";
  var intensity = s.overlayIntensity !== undefined ? s.overlayIntensity : 72;
  var template  = s.storyTemplate || "S1";
  var img       = getImageThumb(s.num);

  var a1 = (intensity / 100).toFixed(2);
  var a2 = (intensity * 0.65 / 100).toFixed(2);

  // Background
  var isGradBg = (template === "S6" && !img);
  var bgStyle  = isGradBg
    ? "background:" + (DS.overlays && DS.overlays.gradientBrand ? DS.overlays.gradientBrand : "linear-gradient(165deg," + primaryDark + "," + primary + "," + primaryLight + ")")
    : img ? "background:url('" + img.thumb + "') center/cover no-repeat" : "background:#222";

  var logo = s.showLogo && DS.logoB64
    ? '<img style="height:16px;width:auto;max-width:55%;object-fit:contain;opacity:.92;flex-shrink:0" src="' + DS.logoB64 + '" referrerpolicy="no-referrer">'
    : '';

  // Swipe-up CTA bar
  var ctaBarHTML = "";
  if (s.showCta) {
    var ctaLabel = cta || "Ver mais";
    ctaBarHTML = '<div class="preview-cta-area" style="font-family:' + bFont + ';color:#fff">'
      + '<svg fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>'
      + '<span style="font-size:6.5px;letter-spacing:.5px">' + esc(ctaLabel).toUpperCase() + '</span>'
      + '</div>';
  }

  // Safe zone guides
  var safeGuides = '<div class="preview-safe-top" title="Zona segura — 15%"></div>'
                 + '<div class="preview-safe-bot" title="Zona segura — 85%"></div>';

  // Safe content padding: 15% top, 18% bottom, 8% sides (matches design-system-template)
  var safeP = "padding:54px 16px 65px"; // 15% of 360 ≈ 54px, 18% ≈ 65px

  var inner = "";

  // ─── S1: Centered Focus ───
  // overlay-bottom, logo top-center, text center-bottom
  if (template === "S1") {
    var ovGrad = "linear-gradient(to top,rgba(0,0,0," + a1 + ") 0%,rgba(0,0,0," + a2 + ") 50%,rgba(0,0,0,0) 100%)";
    inner += '<div class="preview-ov" style="background:' + ovGrad + ';height:55%;bottom:0;top:auto"></div>';
    inner += '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' + safeP + ';z-index:2">';
    inner += logo;
    inner += '<div style="margin-top:auto;text-align:center">';
    if (pretitle) inner += '<div style="font-family:' + bFont + ';font-size:5px;letter-spacing:1.5px;text-transform:uppercase;color:' + primary + ';margin-bottom:2px">' + esc(pretitle) + '</div>';
    if (headline) inner += '<div style="font-family:' + hFont + ';font-size:13px;line-height:1.0;color:' + textLight + ';white-space:pre-line">' + esc(headline) + '</div>';
    if (body)     inner += '<div style="font-family:' + bFont + ';font-size:6px;line-height:1.3;color:rgba(255,255,255,.82);margin-top:3px;white-space:pre-line">' + esc(body) + '</div>';
    if (cta) inner += '<div style="font-family:' + bFont + ';font-size:5.5px;color:' + primary + ';font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-top:4px">' + esc(cta) + ' →</div>';
    inner += '</div></div>';
  }

  // ─── S2: Editorial Asymmetric ───
  // overlay-left 50%, logo top-RIGHT, text confined to left 45%
  else if (template === "S2") {
    var ovGrad = "linear-gradient(to right,rgba(0,0,0," + a1 + ") 0%,rgba(0,0,0," + a2 + ") 40%,rgba(0,0,0,0) 100%)";
    inner += '<div class="preview-ov" style="background:' + ovGrad + ';width:55%;height:100%;left:0;right:auto"></div>';
    inner += '<div style="position:absolute;inset:0;display:flex;flex-direction:column;' + safeP + ';z-index:2">';
    inner += '<div style="display:flex;justify-content:flex-end">' + logo + '</div>';
    inner += '<div style="margin-top:auto;margin-bottom:8px;width:45%;max-width:45%">';
    if (pretitle) inner += '<div style="font-family:' + bFont + ';font-size:5px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:2px">' + esc(pretitle) + '</div>';
    if (headline) inner += '<div style="font-family:' + hFont + ';font-size:11px;line-height:1.0;color:' + textLight + ';white-space:pre-line">' + esc(headline) + '</div>';
    if (body)     inner += '<div style="font-family:' + bFont + ';font-size:5.5px;line-height:1.3;color:rgba(255,255,255,.8);margin-top:3px;white-space:pre-line">' + esc(body) + '</div>';
    inner += '</div></div>';
  }

  // ─── S3: Info / List ───
  // overlay-bottom 55%, logo top-center, headline center, body → lista de itens
  else if (template === "S3") {
    var ovGrad = "linear-gradient(to top,rgba(0,0,0," + a1 + ") 0%,rgba(0,0,0," + a2 + ") 50%,rgba(0,0,0,0) 100%)";
    inner += '<div class="preview-ov" style="background:' + ovGrad + ';height:60%;bottom:0;top:auto"></div>';
    inner += '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' + safeP + ';z-index:2">';
    inner += logo;
    inner += '<div style="margin-top:auto;width:100%">';
    if (headline) inner += '<div style="font-family:' + hFont + ';font-size:11px;line-height:1.0;color:' + textLight + ';text-align:center;margin-bottom:5px;white-space:pre-line">' + esc(headline) + '</div>';
    var listItems = (body || "").split(/[\n·•]/).map(function(l){return l.trim()}).filter(Boolean);
    if (listItems.length) {
      inner += '<ul style="list-style:disc;padding-left:14px;margin:0">';
      listItems.forEach(function(item) {
        inner += '<li style="font-family:' + bFont + ';font-size:5.5px;color:#fff;margin-bottom:2px;line-height:1.3">' + esc(item) + '</li>';
      });
      inner += '</ul>';
    } else if (body) {
      inner += '<div style="font-family:' + bFont + ';font-size:5.5px;line-height:1.3;color:rgba(255,255,255,.8);white-space:pre-line">' + esc(body) + '</div>';
    }
    inner += '</div></div>';
  }

  // ─── S4: Production Tip ───
  // overlay-bottom 60%, logo top-center, badge (pretitle) + headline + body + outline CTA
  else if (template === "S4") {
    var ovGrad = "linear-gradient(to top,rgba(0,0,0," + a1 + ") 0%,rgba(0,0,0," + a2 + ") 50%,rgba(0,0,0,0) 100%)";
    inner += '<div class="preview-ov" style="background:' + ovGrad + ';height:65%;bottom:0;top:auto"></div>';
    inner += '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' + safeP + ';z-index:2">';
    inner += logo;
    inner += '<div style="margin-top:auto;text-align:center;margin-bottom:6px">';
    if (pretitle) inner += '<div style="display:inline-block;margin-bottom:4px;font-family:' + bFont + ';font-size:5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;background:' + primary + ';color:#fff;padding:2px 7px;border-radius:99px">' + esc(pretitle) + '</div><br>';
    if (headline) inner += '<div style="font-family:' + hFont + ';font-size:11px;line-height:1.0;color:' + textLight + ';margin:3px 0;white-space:pre-line">' + esc(headline) + '</div>';
    if (body)     inner += '<div style="font-family:' + bFont + ';font-size:5.5px;line-height:1.3;color:rgba(255,255,255,.82);margin:4px 0 6px;white-space:pre-line">' + esc(body) + '</div>';
    if (cta)      inner += '<div style="display:inline-block;font-family:' + bFont + ';font-size:5.5px;background:rgba(0,0,0,.4);color:#fff;padding:3px 10px;border-radius:99px;border:1px solid rgba(255,255,255,.25)">' + esc(cta) + '</div>';
    inner += '</div></div>';
  }

  // ─── S5: Production Setup ───
  // overlay-bottom 55%, logo top-RIGHT, badge-accent (pretitle) + headline + info rows (body lines)
  else if (template === "S5") {
    var ovGrad = "linear-gradient(to top,rgba(0,0,0," + a1 + ") 0%,rgba(0,0,0," + a2 + ") 50%,rgba(0,0,0,0) 100%)";
    inner += '<div class="preview-ov" style="background:' + ovGrad + ';height:60%;bottom:0;top:auto"></div>';
    inner += '<div style="position:absolute;inset:0;display:flex;flex-direction:column;' + safeP + ';z-index:2">';
    inner += '<div style="display:flex;justify-content:flex-end">' + logo + '</div>';
    inner += '<div style="margin-top:auto;margin-bottom:6px">';
    if (pretitle) {
      inner += '<div style="display:inline-flex;align-items:center;gap:3px;margin-bottom:4px;font-family:' + bFont + ';font-size:5px;background:rgba(250,87,1,.15);color:' + primary + ';padding:2px 7px;border-radius:99px;border:1px solid rgba(250,87,1,.3)">';
      inner += '<span style="width:4px;height:4px;border-radius:50%;background:' + primary + ';display:inline-block;flex-shrink:0"></span>' + esc(pretitle) + '</div><br>';
    }
    if (headline) inner += '<div style="font-family:' + hFont + ';font-size:11px;line-height:1.0;color:' + textLight + ';margin:2px 0 4px;white-space:pre-line">' + esc(headline) + '</div>';
    var rows = (body || "").split(/[\n·•]/).map(function(l){return l.trim()}).filter(Boolean);
    rows.forEach(function(row) {
      inner += '<div style="display:flex;align-items:center;gap:3px;font-family:' + bFont + ';font-size:5px;color:#d4d4d8;margin-top:2px">';
      inner += '<svg style="width:7px;height:7px;color:' + primary + ';flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
      inner += esc(row) + '</div>';
    });
    inner += '</div></div>';
  }

  // ─── S6: Final Result / Promo ───
  // Com foto: overlay top 35% + bottom 40%, badge (pretitle) + logo top, headline + CTA center-bottom
  // Sem foto: gradiente brand, texto centralizado + botão CTA
  // ─── S6: Final Result / Promo ───
  // Estrutura DS: ig-badge (pretitle) + logo em flex-row no TOPO
  //              headline + ig-badge-outline CTA em margin-top:auto (FUNDO)
  // Gradient brand (sem foto): badge = white bg + primaryDark text
  // Com foto: dual overlay top35%+bottom40%, badge = primary bg + white text
  else if (template === "S6") {
    // Badge (pretitle pill)
    var s6BadgeStyle = isGradBg
      ? "font-family:" + bFont + ";font-size:5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;background:#fff;color:" + (pal.primaryDark || "#612100") + ";padding:2px 7px;border-radius:99px"
      : "font-family:" + bFont + ";font-size:5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;background:" + primary + ";color:#fff;padding:2px 7px;border-radius:99px";
    // Logo
    var s6LogoHTML = s.showLogo && DS.logoB64
      ? '<img style="height:' + (isGradBg ? "13px" : "11px") + ';width:auto;object-fit:contain;opacity:.92;flex-shrink:0" src="' + DS.logoB64 + '" referrerpolicy="no-referrer">'
      : "";
    // Header row: badge + logo (DS S6 exato)
    var s6Header = '<div style="display:flex;justify-content:space-between;align-items:center;width:100%">'
      + (pretitle ? '<span style="' + s6BadgeStyle + '">' + esc(pretitle) + '</span>' : '<div></div>')
      + s6LogoHTML
      + '</div>';
    // CTA: ig-badge-outline (DS exato: rgba(0,0,0,.4) + border rgba branca)
    var s6Cta = cta
      ? '<div style="display:inline-block;font-family:' + bFont + ';font-size:5.5px;font-weight:500;background:rgba(0,0,0,.4);color:#fff;padding:3px 10px;border-radius:99px;border:1px solid rgba(255,255,255,.25);backdrop-filter:blur(4px);margin-top:5px">' + esc(cta) + '</div>'
      : "";

    if (isGradBg) {
      inner += '<div style="position:absolute;inset:0;display:flex;flex-direction:column;' + safeP + ';z-index:2">';
      inner += s6Header;
      inner += '<div style="margin-top:auto;text-align:center">';
      if (headline) inner += '<div style="font-family:' + hFont + ';font-size:13px;line-height:1.0;color:#fff;white-space:pre-line">' + esc(headline) + '</div>';
      if (body)     inner += '<div style="font-family:' + bFont + ';font-size:5.5px;line-height:1.3;color:rgba(255,255,255,.85);margin-top:3px;white-space:pre-line">' + esc(body) + '</div>';
      inner += s6Cta + '</div></div>';
    } else {
      var a1t = (intensity * 0.55 / 100).toFixed(2);
      var a1b = (intensity * 0.65 / 100).toFixed(2);
      inner += '<div class="preview-ov" style="background:linear-gradient(to bottom,rgba(0,0,0,' + a1t + ') 0%,rgba(0,0,0,0) 100%);height:35%;top:0;bottom:auto"></div>';
      inner += '<div class="preview-ov" style="background:linear-gradient(to top,rgba(0,0,0,' + a1b + ') 0%,rgba(0,0,0,0) 100%);height:42%;bottom:0;top:auto"></div>';
      inner += '<div style="position:absolute;inset:0;display:flex;flex-direction:column;' + safeP + ';z-index:2">';
      inner += s6Header;
      inner += '<div style="margin-top:auto;text-align:center">';
      if (headline) inner += '<div style="font-family:' + hFont + ';font-size:11px;line-height:1.0;color:' + textLight + ';white-space:pre-line">' + esc(headline) + '</div>';
      if (body)     inner += '<div style="font-family:' + bFont + ';font-size:5.5px;line-height:1.3;color:rgba(255,255,255,.82);margin-top:3px;white-space:pre-line">' + esc(body) + '</div>';
      inner += s6Cta + '</div></div>';
    }
  }

  return '<div class="preview">'
    + '<div class="preview-bg" style="' + bgStyle + '"></div>'
    + inner
    + safeGuides
    + ctaBarHTML
    + '</div>';
}

// Type badge colors
function typeColor(type) {
  var map = { COVER:"#e67e22", INFO:"#2980b9", LIST:"#27ae60", BEHIND:"#8e44ad", PROMO:"#e74c3c", CTA:"#8e44ad" };
  return map[type] || "#c0392b";
}

function render() {
  var h = "";
  S.forEach(function(s) {
    var tc = typeColor(s.type);
    var pal = DS.palette || {};
    var intensity = s.overlayIntensity !== undefined ? s.overlayIntensity : 72;
    var tmpl = s.storyTemplate || "S1";

    h += '<div class="sec" id="sec-' + s.num + '">';
    h += '<div class="sh"><div class="sn" style="background:' + tc + '">' + s.num + '</div><span class="sb" style="background:' + tc + '">' + s.type + '</span></div>';
    h += '<div class="slide-row">';

    // Left: preview
    h += '<div class="slide-left" id="prev-' + s.num + '">';
    h += renderPreview(s, s.headline, s.body, s.pretitle, s.cta);
    h += '<p class="safe-note">— <span>linhas amarelas</span> = zona segura (15%/85%)</p>';
    h += '</div>';

    // Right: controls
    h += '<div class="slide-right">';

    // All text fields
    h += '<div class="fld">';
    h += '<label>Pré-título</label>';
    h += '<input class="ep" data-s="' + s.num + '" value="' + esc(s.pretitle || "") + '" placeholder="Opcional...">';
    h += '<label>Headline</label>';
    h += '<textarea class="eh" data-s="' + s.num + '" rows="3">' + esc(s.headline || "") + '</textarea>';
    h += '<label>Body</label>';
    h += '<textarea class="eb" data-s="' + s.num + '" rows="2">' + esc(s.body || "") + '</textarea>';
    h += '<label>CTA</label>';
    h += '<input class="ec" data-s="' + s.num + '" value="' + esc(s.cta || "") + '" placeholder="Texto do botão ou barra...">';
    h += '</div>';

    // Template selector S1-S6
    var tmplDescs = { S1:"Centralizado", S2:"Assimétrico", S3:"Lista", S4:"Destaque", S5:"Setup", S6:"Promo" };
    h += '<div class="fld"><label>Template de Story</label>';
    h += '<div class="ov-row">';
    h += '<div class="ov-sel">';
    ["S1","S2","S3","S4","S5","S6"].forEach(function(t) {
      var active = tmpl === t ? " on" : "";
      var col = active ? "color:" + (pal.primary || "#FA5701") + ";border-color:" + (pal.primary || "#FA5701") : "";
      h += '<div class="ov-opt' + active + '" data-s="' + s.num + '" data-tmpl="' + t + '" title="' + tmplDescs[t] + '" style="' + col + '">' + t + '</div>';
    });
    h += '</div>';

    // Intensity slider
    h += '<div class="ov-intensity">';
    h += '<label>Intensidade</label>';
    h += '<input type="range" class="oi" data-s="' + s.num + '" min="20" max="100" value="' + intensity + '">';
    h += '<span class="ov-val">' + intensity + '%</span>';
    h += '</div>';

    h += '</div></div>'; // ov-row, fld

    // CTA swipe-up toggle
    h += '<div class="cta-toggle">';
    h += '<input type="checkbox" class="ctachk" data-s="' + s.num + '" id="cta-' + s.num + '"' + (s.showCta ? " checked" : "") + '>';
    h += '<label for="cta-' + s.num + '">Barra "Arraste" no fundo</label>';
    h += '</div>';

    // Image info
    var img = getImageThumb(s.num);
    if (tmpl === "S6" && !img) {
      h += '<div class="no-img">Fundo gradiente da marca + logo (S6 sem foto)</div>';
      h += '<div class="img-btns"><div class="img-btn" data-s="' + s.num + '" data-action="drive">📁 Buscar no Drive (opcional)</div></div>';
    } else if (img) {
      h += '<div class="img-info">';
      h += '<img src="' + img.thumb + '" referrerpolicy="no-referrer" loading="lazy">';
      h += '<div class="img-info-text"><div class="img-info-name">' + esc(img.name || "Imagem selecionada") + '</div>';
      if (img.folder) h += '<div class="img-info-folder">' + esc(img.folder) + '</div>';
      h += '</div></div>';
      h += '<div class="img-btns">';
      h += '<div class="img-btn" data-s="' + s.num + '" data-action="drive">📁 Buscar no Drive</div>';
      h += '<div class="img-btn img-btn-remove" data-s="' + s.num + '" data-action="remove">✕ Remover</div>';
      h += '</div>';
    } else {
      h += '<div class="no-img">Nenhuma imagem selecionada</div>';
      h += '<div class="img-btns"><div class="img-btn" data-s="' + s.num + '" data-action="drive">📁 Buscar no Drive</div></div>';
    }

    h += '</div></div></div>'; // slide-right, slide-row, sec
  });

  document.getElementById("app").innerHTML = h;

  // Texto → live preview
  document.querySelectorAll(".eh, .eb, .ep, .ec").forEach(function(el) {
    el.addEventListener("input", function() {
      var sn = parseInt(this.dataset.s);
      var s = S.find(function(x) { return x.num === sn });
      if (!s) return;
      var hi = document.querySelector('.eh[data-s="' + sn + '"]');
      var bi = document.querySelector('.eb[data-s="' + sn + '"]');
      var pi = document.querySelector('.ep[data-s="' + sn + '"]');
      var ci = document.querySelector('.ec[data-s="' + sn + '"]');
      var prev = document.getElementById("prev-" + sn);
      if (prev) prev.innerHTML = renderPreview(s, hi ? hi.value : s.headline, bi ? bi.value : s.body, pi ? pi.value : s.pretitle, ci ? ci.value : s.cta) + '<p class="safe-note">— <span>linhas amarelas</span> = zona segura (15%/85%)</p>';
    });
  });

  // Template selector
  document.querySelectorAll(".ov-opt").forEach(function(el) {
    el.addEventListener("click", function() {
      var sn = parseInt(this.dataset.s);
      var s = S.find(function(x) { return x.num === sn });
      if (!s) return;
      s.storyTemplate = this.dataset.tmpl;
      render();
    });
  });

  // Overlay intensity
  document.querySelectorAll(".oi").forEach(function(el) {
    el.addEventListener("input", function() {
      var sn = parseInt(this.dataset.s);
      var val = parseInt(this.value);
      var s = S.find(function(x) { return x.num === sn });
      if (!s) return;
      s.overlayIntensity = val;
      var valSpan = this.parentElement.querySelector(".ov-val");
      if (valSpan) valSpan.textContent = val + "%";
      var hi = document.querySelector('.eh[data-s="' + sn + '"]');
      var bi = document.querySelector('.eb[data-s="' + sn + '"]');
      var pi = document.querySelector('.ep[data-s="' + sn + '"]');
      var ci = document.querySelector('.ec[data-s="' + sn + '"]');
      var prev = document.getElementById("prev-" + sn);
      if (prev) prev.innerHTML = renderPreview(s, hi ? hi.value : s.headline, bi ? bi.value : s.body, pi ? pi.value : s.pretitle, ci ? ci.value : s.cta) + '<p class="safe-note">— <span>linhas amarelas</span> = zona segura (15%/85%)</p>';
    });
  });

  // CTA bar toggle
  document.querySelectorAll(".ctachk").forEach(function(el) {
    el.addEventListener("change", function() {
      var sn = parseInt(this.dataset.s);
      var s = S.find(function(x) { return x.num === sn });
      if (!s) return;
      s.showCta = this.checked;
      var hi = document.querySelector('.eh[data-s="' + sn + '"]');
      var bi = document.querySelector('.eb[data-s="' + sn + '"]');
      var pi = document.querySelector('.ep[data-s="' + sn + '"]');
      var ci = document.querySelector('.ec[data-s="' + sn + '"]');
      var prev = document.getElementById("prev-" + sn);
      if (prev) prev.innerHTML = renderPreview(s, hi ? hi.value : s.headline, bi ? bi.value : s.body, pi ? pi.value : s.pretitle, ci ? ci.value : s.cta) + '<p class="safe-note">— <span>linhas amarelas</span> = zona segura (15%/85%)</p>';
    });
  });

  // Image buttons
  document.querySelectorAll(".img-btn").forEach(function(el) {
    el.addEventListener("click", function() {
      var sn = parseInt(this.dataset.s);
      var action = this.dataset.action;
      if (action === "drive") {
        asl = sn;
        openModal();
      } else if (action === "remove") {
        delete sel[sn];
        render();
      }
    });
  });

  upStat();
}

// ─── Modal ───

function openModal() {
  document.getElementById("ov").style.display = "block";
  document.getElementById("modal").style.display = "flex";
  document.getElementById("mtitle").textContent = "Buscar no Drive — Story " + asl + " (" + G.length + " fotos)";
  document.getElementById("mfolder").textContent = DS.driveFolderName ? "📁 " + DS.driveFolderName : "";
  buildTabs();
  showGrid(G);
}

function closeModal() {
  document.getElementById("ov").style.display = "none";
  document.getElementById("modal").style.display = "none";
}

function buildTabs() {
  var tabs = document.getElementById("mtabs");
  tabs.innerHTML = "";
  var a = document.createElement("button");
  a.className = "tab on";
  a.textContent = "Todas (" + G.length + ")";
  a.addEventListener("click", function() {
    tabs.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("on") });
    a.classList.add("on");
    showGrid(G);
  });
  tabs.appendChild(a);
  Object.keys(FC).sort().forEach(function(f) {
    var b = document.createElement("button");
    b.className = "tab";
    b.textContent = f + " (" + FC[f] + ")";
    b.addEventListener("click", function() {
      tabs.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("on") });
      b.classList.add("on");
      showGrid(G.filter(function(i) { return i.folder === f }));
    });
    tabs.appendChild(b);
  });
  var si = document.createElement("input");
  si.type = "text";
  si.className = "modal-search";
  si.placeholder = "Buscar...";
  si.addEventListener("input", function() {
    var q = this.value.toLowerCase();
    var af = tabs.querySelector(".tab.on").textContent;
    var base = af.startsWith("Todas") ? G : G.filter(function(i) { return af.startsWith(i.folder) });
    showGrid(q ? base.filter(function(i) { return i.name.toLowerCase().indexOf(q) > -1 }) : base);
  });
  tabs.appendChild(si);
}

function showGrid(items) {
  var grid = document.getElementById("mgrid");
  var h = "";
  items.forEach(function(i) {
    var isSel = false;
    for (var k in sel) { if (sel[k] === i.id) { isSel = true; break } }
    h += '<div class="mc' + (isSel ? " sel" : "") + '" data-id="' + i.id + '" data-name="' + esc(i.name) + '" data-folder="' + esc(i.folder) + '">';
    h += '<img src="' + i.thumb + '" loading="lazy" referrerpolicy="no-referrer">';
    h += '<p>' + i.name + '</p><small>' + i.folder + '</small></div>';
  });
  if (!items.length) h = '<p style="grid-column:1/-1;text-align:center;padding:40px;color:#444">Nenhuma imagem</p>';
  grid.innerHTML = h;
  grid.parentElement.scrollTop = 0;
  grid.querySelectorAll(".mc").forEach(function(c) {
    c.addEventListener("click", function() {
      sel[asl] = this.dataset.id;
      var s = S.find(function(x) { return x.num === asl });
      if (s) {
        s.selectedImage = {
          id: this.dataset.id,
          thumb: this.querySelector("img").src,
          name: this.dataset.name,
          folder: this.dataset.folder
        };
      }
      closeModal();
      render();
    });
  });
}

document.getElementById("mcls").addEventListener("click", closeModal);
document.getElementById("ov").addEventListener("click", closeModal);

// ─── Status ───

function upStat() {
  var total = S.length, done = 0;
  S.forEach(function(s) {
    if (sel[s.num] || s.storyTemplate === "S6") done++;
  });
  var e = document.getElementById("stat");
  e.textContent = done === total ? "Tudo pronto! Clique para copiar." : done + " de " + total + " stories prontos";
  e.style.color = done === total ? "#2ecc71" : "#888";
}

// ─── Copy all ───

document.getElementById("cbtn").addEventListener("click", function() {
  var l = [(DS.projectName || META.project) + " — " + (META.theme || "Stories"), ""];
  S.forEach(function(s) {
    var hi = document.querySelector('.eh[data-s="' + s.num + '"]');
    var bi = document.querySelector('.eb[data-s="' + s.num + '"]');
    var pi = document.querySelector('.ep[data-s="' + s.num + '"]');
    var ci = document.querySelector('.ec[data-s="' + s.num + '"]');
    l.push("Story " + s.num + " [" + s.type + "]");
    if (pi && pi.value) l.push("  Pretitle: " + pi.value);
    l.push("  Headline: " + (hi ? hi.value : s.headline));
    l.push("  Body: " + (bi ? bi.value : s.body));
    l.push("  Template: " + (s.storyTemplate || "S1") + " — intensidade " + (s.overlayIntensity || 72) + "%");
    if (s.showLogo) l.push("  Logo: sim");
    if (s.showCta)  l.push("  Barra CTA: sim");
    if (ci && ci.value) l.push("  CTA: " + ci.value);
    else if (s.cta) l.push("  CTA: " + s.cta);
    if (sel[s.num]) {
      var img = getImageThumb(s.num);
      l.push("  Imagem: " + (img ? img.name : "?") + " | " + sel[s.num]);
    } else if (s.storyTemplate === "S6") {
      l.push("  Imagem: sem foto (S6 gradiente brand)");
    } else {
      l.push("  Imagem: NENHUMA");
    }
    l.push("");
  });
  var tx = l.join("\n");
  document.getElementById("ctx").value = tx;
  try {
    var t = document.createElement("textarea");
    t.value = tx;
    t.style.cssText = "position:fixed;left:-9999px";
    document.body.appendChild(t);
    t.select();
    document.execCommand("copy");
    document.body.removeChild(t);
    document.getElementById("stat").textContent = "Copiado!";
    document.getElementById("stat").style.color = "#2ecc71";
  } catch (e) {}
  document.getElementById("cmod").style.display = "block";
  document.getElementById("cbg").style.display = "block";
  document.getElementById("ctx").select();
});

document.getElementById("ccl").addEventListener("click", function() {
  document.getElementById("cmod").style.display = document.getElementById("cbg").style.display = "none";
});
document.getElementById("cbg").addEventListener("click", function() {
  document.getElementById("cmod").style.display = this.style.display = "none";
});

render();
</script>
</body>
</html>
